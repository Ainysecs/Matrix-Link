name: Auto Release e Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build para ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary_name: chat-linux
            file_name: chat-linux
          - os: macos-latest
            binary_name: chat-macos
            file_name: chat-macos
          - os: windows-latest
            binary_name: chat-windows
            file_name: chat-windows.exe

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Instalar Dependências
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install

    - name: Gerar Binário Único (PyInstaller)
      shell: bash
      run: |
        poetry run pyinstaller --onefile \
          --name ${{ matrix.binary_name }} \
          --collect-submodules=nacl \
          --collect-data=textual \
          main.py

    - name: Gerar a Release e Anexar Binários
      uses: softprops/action-gh-release@v2
      with:
        # formatação visual exata:
        name: "🌐 Matrix-Link: ${{ github.ref_name }}"
        body: |
          ## 🖥️ Resumo das alterações no Matrix-Link:
          *(...)*
          
        generate_release_notes: true
        draft: true
        prerelease: false
        files: dist/${{ matrix.file_name }}
